enable: false

license: "free"

token:
  secret: "secretkey"

# Maximum number of tool iterations per prompt to prevent infinite loops
max_workflow_iterations: 5

database:
  type: "sqlite"
  sqlite:
    file: "mcai.db"
  postgresql:
    host: "localhost"
    port: 5432
    database: "mcai"
    username: "postgres"
    password: "password"
  mongodb:
    uri: "mongodb://localhost:27017"
    database: "mcai"

console:
  platform: "deepseek"
  model: "deepseek-chat"
  token: "your-console-token"

platforms:
  - deepseek,https://api.deepseek.com,deepseek-chat
